<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Secundario - Sibi POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#17DE8B",
              secondary: "#030047",
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
      <!-- Card principal -->
      <div class="bg-white rounded-xl shadow-lg p-8">
        <!-- Logo -->
        <div class="text-center mb-8">
          <div class="inline-flex items-center gap-2">
            <!-- Logo icon (forma geométrica multicolor) -->
            <svg
              width="40"
              height="40"
              viewBox="0 0 40 40"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M20 0C20 0 8 10 8 20C8 25.5 12 30 20 35C28 30 32 25.5 32 20C32 10 20 0 20 0Z"
                fill="#17DE8B"
              />
              <path
                d="M20 0C20 0 15 8 12 15C10 18 8 20 8 20C8 15 12 8 20 0Z"
                fill="#FFD700"
              />
              <path
                d="M20 0C20 0 25 8 28 15C30 18 32 20 32 20C32 15 28 8 20 0Z"
                fill="#FF6B6B"
              />
            </svg>
            <span class="text-3xl font-bold text-secondary">Sibi</span>
          </div>
        </div>

        <!-- Toggle tipo de usuario -->
        <div class="mb-6 p-4 bg-gray-50 rounded-lg">
          <div class="flex items-center justify-between">
            <div>
              <div class="text-secondary font-semibold text-lg">Secundario</div>
              <div class="text-gray-500 text-sm">
                Ingresar como usuario secundario
              </div>
            </div>
            <!-- Toggle Switch -->
            <button
              id="toggleSwitch"
              class="relative inline-flex h-7 w-12 items-center rounded-full bg-primary transition-colors focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2"
            >
              <span
                class="inline-block h-5 w-5 transform rounded-full bg-white transition-transform translate-x-6 shadow-md"
              ></span>
            </button>
          </div>
        </div>

        <!-- Formulario -->
        <form id="loginForm" class="space-y-5">
          <!-- Campo Empresa -->
          <div>
            <label for="empresa" class="block text-secondary font-medium mb-2">
              Empresa
            </label>
            <input
              type="text"
              id="empresa"
              name="empresa"
              placeholder="Nombre de Empresa o Ruc"
              required
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
            />
          </div>

          <!-- Campo Contraseña -->
          <div>
            <label for="password" class="block text-secondary font-medium mb-2">
              Contraseña
            </label>
            <div class="relative">
              <input
                type="password"
                id="password"
                name="password"
                placeholder="••••••••"
                required
                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all pr-12"
              />
              <!-- Botón mostrar/ocultar contraseña -->
              <button
                type="button"
                id="togglePassword"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700 focus:outline-none"
              >
                <!-- Icono ojo cerrado -->
                <svg
                  id="eyeOff"
                  class="w-5 h-5"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"
                  ></path>
                </svg>
                <!-- Icono ojo abierto (oculto por defecto) -->
                <svg
                  id="eyeOn"
                  class="w-5 h-5 hidden"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                  ></path>
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                  ></path>
                </svg>
              </button>
            </div>
          </div>

          <!-- Botón Ingresar -->
          <button
            type="submit"
            class="w-full bg-primary text-white font-semibold py-3 rounded-lg hover:bg-[#14C578] transition-colors focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 shadow-sm"
          >
            Ingresar
          </button>
        </form>

        <!-- Divisor -->
        <div class="relative my-6">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-gray-300"></div>
          </div>
          <div class="relative flex justify-center">
            <span class="bg-white px-3 text-gray-500 text-sm">o</span>
          </div>
        </div>

        <!-- Botón Ingresar con celular -->
        <button
          type="button"
          id="loginPhone"
          class="w-full bg-white border border-gray-300 text-secondary font-semibold py-3 rounded-lg hover:bg-gray-50 transition-colors focus:outline-none focus:ring-2 focus:ring-gray-300 focus:ring-offset-2"
        >
          Ingresar con celular
        </button>
      </div>
    </div>

    <script>
      // Toggle mostrar/ocultar contraseña
      const togglePassword = document.getElementById("togglePassword");
      const passwordInput = document.getElementById("password");
      const eyeOff = document.getElementById("eyeOff");
      const eyeOn = document.getElementById("eyeOn");

      togglePassword.addEventListener("click", () => {
        const type = passwordInput.type === "password" ? "text" : "password";
        passwordInput.type = type;

        eyeOff.classList.toggle("hidden");
        eyeOn.classList.toggle("hidden");
      });

      // Toggle switch (ejemplo de funcionalidad)
      const toggleSwitch = document.getElementById("toggleSwitch");
      let isSecondary = true;

      toggleSwitch.addEventListener("click", () => {
        isSecondary = !isSecondary;
        const span = toggleSwitch.querySelector("span");

        if (isSecondary) {
          toggleSwitch.classList.remove("bg-gray-300");
          toggleSwitch.classList.add("bg-primary");
          span.classList.remove("translate-x-1");
          span.classList.add("translate-x-6");
        } else {
          toggleSwitch.classList.remove("bg-primary");
          toggleSwitch.classList.add("bg-gray-300");
          span.classList.remove("translate-x-6");
          span.classList.add("translate-x-1");
        }
      });

      // Manejo del formulario
      const loginForm = document.getElementById("loginForm");
      loginForm.addEventListener("submit", (e) => {
        e.preventDefault();

        const empresa = document.getElementById("empresa").value;
        const password = document.getElementById("password").value;

        console.log("Login attempt:", {
          empresa,
          password,
          tipoUsuario: isSecondary ? "secundario" : "primario",
        });

        // Aquí irá tu lógica de autenticación
        alert("Funcionalidad de login a implementar");
      });

      // Botón login con celular
      document.getElementById("loginPhone").addEventListener("click", () => {
        console.log("Login con celular clicked");
        alert("Funcionalidad de login con celular a implementar");
      });
    </script>
  </body>
</html>
